name: Playwright Tests

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Start backend server
        run: |
          cd backend
          npm install
          nohup node server.js > server.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend started with PID: $BACKEND_PID"
          
          # Wait 20 seconds for backend to start
          sleep 20
          
          # Check if backend process is still alive
          if ! kill -0 $BACKEND_PID 2>/dev/null; then
            echo "❌ Backend process died!"
            cat server.log
            exit 1
          fi
          
          echo "✅ Backend process is alive"
          tail -20 server.log
          
          # Try to connect to port 5000
          if curl -s http://localhost:5000 > /dev/null 2>&1; then
            echo "✅ Backend is responding on port 5000!"
          else
            echo "⚠️  Backend not responding yet, but process is alive. Waiting..."
            sleep 10
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "✅ Backend is now responding!"
            else
              echo "❌ Backend still not responding after 30 seconds"
              cat server.log
              exit 1
            fi
          fi
        env:
          MONGO_URI: mongodb://localhost:27017/mindsphere
          JWT_SECRET: test-secret-key
          GEMINI_API_KEY: AIzaSyALkpovxZo0VgJ2qQBJmr9vnkqtfvfFpA0
          NODE_ENV: test
          PORT: 5000

      - name: Generate visual regression baselines
        run: npx playwright test e2e/visual.spec.ts --update-snapshots
        working-directory: frontend
        continue-on-error: true
        env:
          VITE_API_BASE_URL: http://localhost:5000

      - name: Commit visual regression baselines
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f frontend/e2e/visual.spec.ts-snapshots/ 2>/dev/null || true
          git commit -m "Update visual regression baselines" 2>/dev/null || true
        continue-on-error: true

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:5000

      - name: Install Lighthouse CI
        run: npm install -D @lhci/cli

      - name: Run Lighthouse CI
        run: npm run lhci

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run bundle size check
        run: npm run bundlewatch
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
