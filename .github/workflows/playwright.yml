name: Playwright Tests

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Start backend server
        run: npm start &
        working-directory: backend
        env:
          DATABASE_URL: mongodb://localhost:27017/mindsphere
          JWT_SECRET: test-secret-key
          NODE_ENV: test
          AI_SERVICE_URL: http://localhost:5001

      - name: Wait for backend server
        run: npx wait-on http://localhost:5000 --timeout 30000

      - name: Start frontend server
        run: npm run dev &
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:5000

      - name: Wait for frontend server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend

      - name: Install Lighthouse CI
        run: npm install -D @lhci/cli

      - name: Run Lighthouse CI
        run: npm run lhci

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run bundle size check
        run: npm run bundlewatch
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
