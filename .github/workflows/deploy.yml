name: CI-CD Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MONGO_URI: mongodb://localhost:27017/mindsphere
      JWT_SECRET: test-secret-key
      NODE_ENV: test
      PORT: 5000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            if mongosh --eval "db.adminCommand('ping')" mongodb://localhost:27017 > /dev/null 2>&1; then
              echo "MongoDB is ready!"
              exit 0
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done
          echo "MongoDB failed to start!"
          exit 1

      - name: Start backend server
        run: |
          cd backend
          nohup npm start > server.log 2>&1 &
          sleep 5
          cat server.log

      - name: Check if backend is running
        run: |
          for i in {1..12}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... ($i/12)"
            sleep 5
          done
          echo "Backend failed to start!"
          cat backend/server.log
          exit 1

      - name: Run tests
        run: npx playwright test
        working-directory: frontend

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Netlify Staging
        run: |
          curl -X POST ${{ secrets.NETLIFY_STAGING_DEPLOY_HOOK }}

  smoke-tests:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests against staging
        run: |
          E2E_BASE_URL=https://staging.yoursite.netlify.app npx playwright test e2e/smoke.spec.ts

  deploy-production:
    needs: smoke-tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Netlify Production
        run: |
          curl -X POST ${{ secrets.NETLIFY_PROD_DEPLOY_HOOK }}
