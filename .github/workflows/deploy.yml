name: CI-CD Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend server
        run: npm start &
        working-directory: backend

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:5000 --timeout 30000

      - name: Run tests
        run: npx playwright test
        working-directory: frontend

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Netlify Staging
        run: |
          curl -X POST ${{ secrets.NETLIFY_STAGING_DEPLOY_HOOK }}

  smoke-tests:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests against staging
        run: |
          E2E_BASE_URL=https://staging.yoursite.netlify.app npx playwright test e2e/smoke.spec.ts

  deploy-production:
    needs: smoke-tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Netlify Production
        run: |
          curl -X POST ${{ secrets.NETLIFY_PROD_DEPLOY_HOOK }}
